version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: h98r_postgres
    environment:
      POSTGRES_DB: h98r
      POSTGRES_USER: h98r_user
      POSTGRES_PASSWORD: h98r_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U h98r_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: h98r_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: h98r_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://h98r_user:h98r_password@postgres:5432/h98r
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - h98r_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: h98r_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - h98r_network

volumes:
  postgres_data:
  redis_data:

networks:
  h98r_network:
    driver: bridge
